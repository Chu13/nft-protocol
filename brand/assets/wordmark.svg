<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60" role="img" aria-label="OBRA">
  <!--
    OBRA text-only wordmark (no seal). For contexts where the seal is shown separately or
    isn't needed — footers, print, narrow headers.
    Ink white (#e9faf2) on dark surfaces, Fraunces 600.
    Same font-loading caveat as logo.svg: this is live <text>, not outlined paths.
  -->
  <text
    x="4" y="44"
    font-family="'Fraunces', Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="600"
    letter-spacing="0.5"
    fill="#e9faf2">OBRA</text>
</svg>
